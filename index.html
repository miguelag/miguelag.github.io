<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Projects</title>
<style>
  body {
    background: #0f0f14;
    color: #e8e4d8;
    font-family: 'Georgia', serif;
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    padding: 20px;
  }
  .button {
    display: inline-block;
    padding: 20px 40px;
    margin: 20px;
    font-size: 1.5rem;
    text-decoration: none;
    border-radius: 8px;
    transition: all 0.3s ease;
    text-align: center;
    min-width: 300px;
    min-height: 100px;
    display: flex;
    align-items: center;
    justify-content: center;
  }
  .wordle-button {
    background: linear-gradient(45deg, #f5c842, #4fc3f7);
    color: #0f0f14;
    font-family: 'Arial', sans-serif;
    font-weight: bold;
    border: 2px solid #f5c842;
  }
  .wordle-button:hover {
    background: linear-gradient(45deg, #4fc3f7, #f5c842);
    transform: scale(1.05);
  }
  .quantum-life-button {
    background: linear-gradient(45deg, #2a003a, #000000);
    color: #00ff00;
    font-family: 'Share Tech Mono', monospace;
    font-weight: normal;
    border: 2px solid #00ff00;
    box-shadow: 0 0 15px rgba(0, 255, 0, 0.7);
  }
  .quantum-life-button:hover {
    background: linear-gradient(45deg, #000000, #2a003a);
    transform: scale(1.05);
    box-shadow: 0 0 25px rgba(0, 255, 0, 1);
  }
</style>
</head>
<body>
  <a href="wordle_word_frequency/" class="button wordle-button">Wordle Word Frequency</a>
  <!-- Each button is designed to have a unique visual style reflecting the project it links to. -->
  <a href="game_of_quantum_life/" class="button quantum-life-button">Game of Quantum Life</a>
</body>
</html></content>
